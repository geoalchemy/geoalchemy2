services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      mssql:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: gis
      POSTGRES_PASSWORD: gis
      POSTGRES_DB: gis
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASSWORD: gis
      MARIADB_HOST: mariadb
      MARIADB_ROOT_PASSWORD: gis
      MSSQL_HOST: mssql
      MSSQL_SA_PASSWORD: "GeoAlchemy2!Sql2025"
      MSSQL_TEST_DB: gis
      MSSQL_TEST_LOGIN: gis
      MSSQL_TEST_PASSWORD: gis
      PYTEST_POSTGRESQL_DB_URL: "postgresql://gis:gis@postgres/gis"
      PYTEST_MYSQL_DB_URL: "mysql://gis:gis@mysql/gis"
      PYTEST_MARIADB_DB_URL: "mariadb://gis:gis@mariadb/gis"
      PYTEST_MSSQL_DB_URL: "mssql+pyodbc://gis:gis@mssql:1433/gis?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
      SPATIALITE_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/mod_spatialite.so
    stdin_open: true
    tty: true
    volumes:
      - ..:/geoalchemy2_read_only:ro
      - ./output:/output

  postgres:
    image: postgis/postgis:18-master
    environment:
      POSTGRES_USER: gis
      POSTGRES_PASSWORD: gis
      POSTGRES_DB: gis
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gis -d gis"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  mysql:
    image: mysql:9
    environment:
      MYSQL_ROOT_PASSWORD: gis
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pgis --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mariadb:
    image: mariadb:12
    environment:
      MARIADB_ROOT_PASSWORD: gis
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -pgis --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    # SQL Server 2025 can assert on heterogeneous host CPU topology unless the
    # container sees a constrained CPU set.
    cpuset: "0"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "GeoAlchemy2!Sql2025"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -b -Q \"SELECT 1\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
